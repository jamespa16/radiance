run_name: fineweb-router-transformer-500m

data:
  dataset: HuggingFaceFW/fineweb # ~15TB, train split only (no validation split exists)
  text_column: text
  tokenizer: gpt2
  seq_len: 1024
  num_workers: 4
  cache_dir: .cache/radiance/tokenized
  streaming: true # required: fineweb is far too large to tokenize/cache to disk up front
  shuffle_buffer_size: 10000
  # fineweb has no validation split, so carve a deterministic 2000-example held-out slice off
  # the front of train instead (excluded from training) — see CLAUDE.md's "Extending" section.
  eval_split_size: 2000
  # Uncomment to also avoid re-fetching/re-tokenizing already-streamed data across repeated
  # short runs (e.g. while iterating on this config) — see CLAUDE.md's "Extending" section.
  disk_cache_max_gb: 50
  disk_cache_shard_size: 100
  prefetch_factor: 2

model:
  d_model: 1280
  head_dim: 64
  n_layers: 22
  loop_count: 1 # unused while use_router: true
  use_router: true
  max_loops: 6 # sensible mid-range default; the sweep below explores 2-8
  ponder_weight: 1.0e-2
  halt_epsilon: 0.01
  ffn_mult: 2.0
  ffn_depth: 2
  dropout: 0.01
  max_seq_len: 1024
  # Same architecture dims as configs/fineweb_500m.yaml (~498.5M params, verified via
  # DenseTransformer(...).num_parameters()) for a direct apples-to-apples comparison against
  # that fixed-loop_count baseline. batch_size below is verified (empirical forward+backward+
  # AdamW(fused) step, bf16) to peak at 22.96GB reserved VRAM even at this sweep's worst case
  # (max_loops=8) on a 32GB card — comfortable headroom below the hard limit. Model size was
  # deliberately not pushed higher: probing intermediate sizes up to ~700M showed peak reserved
  # VRAM jumps straight to ~29.4GB (too tight for an unattended multi-run sweep, leaving under
  # 3GB of margin) rather than scaling smoothly, so this size is the largest with a verified
  # safety margin, not just the largest that technically fits once.

train:
  batch_size: 2 # verified via empirical VRAM probe at max_loops=8 (this sweep's worst case) — see above
  lr: 2.5e-4
  weight_decay: 0.01
  warmup_ratio: 0.0667
  tokens_per_param: 20 # Chinchilla-optimal; max_steps is derived from this and printed/logged at run start
  grad_clip: 1.0
  log_every: 10
  eval_every: 100
  save_every: 100
  output_dir: checkpoints/fineweb_router
  seed: 42
  device: auto
  compile: true # validated safe for the router path (zero graph breaks under fullgraph=True) — see CLAUDE.md
  dtype: bf16

wandb:
  project: radiance
  entity: null
  mode: online
