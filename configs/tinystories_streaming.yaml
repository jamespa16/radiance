run_name: tinystories-dense-transformer-streaming

data:
  dataset: roneneldan/TinyStories
  text_column: text
  tokenizer: gpt2
  seq_len: 512
  num_workers: 4
  cache_dir: .cache/radiance/tokenized # unused while streaming: true, unless disk_cache_max_gb is also set
  streaming: true
  shuffle_buffer_size: 1000
  # Uncomment to enable the bounded on-disk cache, so repeated short runs against this
  # dataset/config don't re-fetch/re-tokenize data already streamed before. Oldest cached
  # data is evicted once the total budget below is exceeded.
  # disk_cache_max_gb: 0.5
  # disk_cache_shard_size: 100
  prefetch_factor: 2

model:
  d_model: 256
  head_dim: 32
  n_layers: 6
  loop_count: 1
  ffn_mult: 4.0
  ffn_depth: 3
  dropout: 0.1
  max_seq_len: 512

train:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.2
  max_steps: 1000
  grad_clip: 1.0
  log_every: 10
  eval_every: 50
  save_every: 100
  output_dir: checkpoints/tinystories/streaming
  seed: 42
  device: auto
  compile: true
  dtype: bf16

wandb:
  project: radiance
  entity: null
  mode: online
