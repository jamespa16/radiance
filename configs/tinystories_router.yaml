run_name: tinystories-dense-transformer-router

data:
  dataset: roneneldan/TinyStories
  text_column: text
  tokenizer: gpt2
  seq_len: 512
  num_workers: 4
  cache_dir: .cache/radiance/tokenized

model:
  d_model: 256
  head_dim: 64
  n_layers: 6
  loop_count: 1 # unused while use_router: true
  use_router: true
  max_loops: 6
  ponder_weight: 1.0e-2
  halt_epsilon: 0.01
  ffn_mult: 4.0
  ffn_depth: 3
  dropout: 0.03
  max_seq_len: 512

train:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.2
  max_steps: 1000
  grad_clip: 1.0
  log_every: 10
  eval_every: 50
  save_every: 100
  output_dir: checkpoints/tinystories/router
  seed: 42
  device: auto
  compile: true # verified: ACT loop compiles cleanly under torch.compile("reduce-overhead"), zero graph breaks
  dtype: bf16

wandb:
  project: radiance
  entity: null
  mode: online
