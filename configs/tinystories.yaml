run_name: tinystories-dense-transformer

data:
  dataset: roneneldan/TinyStories
  text_column: text
  tokenizer: gpt2
  seq_len: 512
  num_workers: 4
  cache_dir: .cache/radiance/tokenized

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  loop_count: 1
  ffn_dim: 1024
  ffn_depth: 3
  dropout: 0.1
  max_seq_len: 512

train:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  max_steps: 1000
  grad_clip: 1.0
  log_every: 10
  eval_every: 50
  save_every: 100
  output_dir: checkpoints/tinystories/run2
  seed: 42
  device: cuda
  compile: true

wandb:
  project: radiance
  entity: null
  mode: online
